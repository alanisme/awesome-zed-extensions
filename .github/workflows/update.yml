name: Update Awesome List

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test ./...

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run .

      - name: Commit and push changes
        run: |
          git config user.name "Alan"
          git config user.email "alanisme.my@gmail.com"
          git add README.md data/history.json data/extensions.json assets/
          git diff --staged --quiet || git commit -m "Update awesome list $(date -u +%Y-%m-%d)"
          git push
